<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>சமூக விழிப்புணர்வு</title>
    <style>
        body {
            font-family: "Noto Sans Tamil", Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #2c7a7b;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        .card {
            background: white;
            margin: 15px auto;
            padding: 20px;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 20px;
            text-align: center;
        }
        footer {
            background: #2c7a7b;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>சமூக விழிப்புணர்வு</h1>
    <p>தமிழ் குறள் வடிவில் சமூக செய்தி</p>
</header>

<section>
    <div class="card">நீர் காப்போம் – நம் வாழ்வு காப்போம்</div>
    <div class="card">சுத்தம் ஒரு பழக்கம் அல்ல, அது பொறுப்பு</div>
    <div class="card">மரம் நட்டவன் – உயிர் நட்டவன்</div>
    <div class="card">கல்வி தான் மனிதனின் மிகப் பெரிய செல்வம்</div>
    <div class="card">ஒன்றுபட்ட சமூகம் – முன்னேறும் நாடு</div>
</section>

<footer>
    <p>© 2026 சமூக விழிப்புணர்வு</p>
</footer>

</body>
</html>
